# fly.toml app configuration file generated for expensify-backend-dusky-summit-570 on 2026-06-16T10:30:26+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'expensify-backend-dusky-summit-570'
primary_region = 'bom'

[build]

[env]
  CORS_ORIGIN = '*'
  DATABASE_URL = 'file:/data/prod.db'
  NODE_ENV = 'production'
  PORT = '3001'

[[mounts]]
  source = 'notifier_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
